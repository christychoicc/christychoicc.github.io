project:
  type: website
  output-dir: docs
  render:
    - "*.qmd"
    - "!slides/"
  resources:
    - slides/
    - images/
    - coursework/

website:
  title: "Christy Choi"

  navbar:
    title: false
    collapse: true
    collapse-below: lg
    background: light
    left:
      - text: "Homepage"
        href: index.qmd
      - text: "Coursework"
        href: coursework.qmd
      - text: "CV"
        href: cv.qmd
      - text: "About"
        icon: gear
        href: about.qmd
    right:
      - icon: github
        href: "https://github.com/christychoicc"

  # DO NOT use Quarto’s docked sidebar if you inject your own profile sidebar
  sidebar: false

format:
  html:
    theme:
      light: [cosmo, flatly]
      dark: [cosmo, darkly]
    toc: false
    code-link: true
    css: styles.css
    include-before-body: _sidebar-profile.html
    page-layout: full

editor: visual